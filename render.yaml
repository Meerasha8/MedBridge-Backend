services:
  - type: web
    name: medbridge-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: MCP_SERVER_URL
        sync: false
      - key: MCP_SECRET_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
    healthCheckPath: /health
